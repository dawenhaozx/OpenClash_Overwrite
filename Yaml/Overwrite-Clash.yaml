proxy-providers:
  Sub-store:
    type: http
    url: "url"
    path: ./proxy_provider/provider.yaml
    proxy: DIRECT
    interval: 86400
    health-check:
      enable: true
      interval: 120
      url: http://www.gstatic.com/generate_204
    override:
      skip-cert-verify: true
      udp: true

anchor:
  # 策略组类型模板
  BaseURL-test: &BaseURL-test {type: url-test, include-all: true, tolerance: 50, interval: 300, url: http://www.gstatic.com/generate_204, hidden: true}
  BaseDIRECT:   &BaseDIRECT   {type: url-test, hidden: true}

  # 节点筛选正则
  FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG)).*$'
  FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP)).*$'
  FilterUS: &FilterUS '^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$'
  FilterOT: &FilterOT '^(?!.*(DIRECT|直接连接|美|港|坡|台|新|日|韩|🇭🇰|🇸🇬|🇺🇸|HK|SG|US|HKG|SIN|XSP|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))'
  FilterO: &FilterO '^(?=.*(?i)(O)).*$'

  # 策略组代理列表模板
  SelectAU: &SelectAU {type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "^((?!(直连)).)*$"}
  SelectMS: &SelectMS {type: select, proxies: [香港节点, 美国节点, 新加坡节点, 其它节点, 自动选择, 全球直连, REJECT], use: [Sub-store]}
  SelectMH: &SelectMH {type: select, proxies: [手动选择, 香港节点, 美国节点, 新加坡节点, 其它节点, O, 自动选择, 全球直连, REJECT], use: [Sub-store]}
  SelectHK: &SelectHK {type: select, proxies: [手动选择, 香港节点, 美国节点, 新加坡节点, 其它节点, O, 自动选择, 全球直连, REJECT], use: [Sub-store]}
  SelectUS: &SelectUS {type: select, proxies: [手动选择, 美国节点, 香港节点, 新加坡节点, 其它节点, O, 自动选择, 全球直连, REJECT], use: [Sub-store]}
  SelectSG: &SelectSG {type: select, proxies: [手动选择, 新加坡节点, 香港节点, 美国节点, 其它节点, O, 自动选择, 全球直连, REJECT], use: [Sub-store]}
  SelectOT: &SelectOT {type: select, proxies: [手动选择, 其它节点, 香港节点, 美国节点, 新加坡节点, 自动选择, 全球直连, REJECT], use: [Sub-store]}
  SelectO:  &SelectO  {type: select, proxies: [手动选择, O, 其它节点, 香港节点, 美国节点, 新加坡节点, 自动选择, 全球直连, REJECT], use: [Sub-store]}

  # 规则提供者锚点
  ip:     &ip     {type: http, interval: 86400, behavior: ipcidr,    format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain,    format: mrs}
  class:  &class  {type: http, interval: 86400, behavior: classical, format: text}

# =========================================
#             策略组配置
# =========================================
proxy-groups:
  - {name: 手动选择,   <<: *SelectMS, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/11111.png"}
  - {name: 自动选择,   <<: *SelectAU, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Flight.png"}
  - {name: AI服务,     <<: *SelectUS, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/AI_bot.png"}
  - {name: Sony,       <<: *SelectO, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Network.png"}
  - {name: Steam,      <<: *SelectHK, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Steam.png"}
  - {name: 谷歌服务,   <<: *SelectHK, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Google.png"}
  - {name: 微软服务,   <<: *SelectHK, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Microsoft.png"}
  - {name: 苹果服务,   <<: *SelectHK, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Apple_black.png"}
  - {name: Emby,       <<: *SelectO, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Emby.png"}
  - {name: 国外媒体,   <<: *SelectSG, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Network.png"}
  - {name: 漏网之鱼,   <<: *SelectMH, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/match.png"}

  # 地区节点组
  - {name: 香港节点,    <<: *BaseURL-test, filter: *FilterHK, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Hong_Kong.png"}
  - {name: 美国节点,    <<: *BaseURL-test, filter: *FilterUS, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/USA.png"}
  - {name: 新加坡节点,  <<: *BaseURL-test, filter: *FilterSG, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Singapore.png"}
  - {name: 其它节点,    <<: *BaseURL-test, filter: *FilterOT, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Taiwan_Province.png"}
  - {name: O,         <<: *BaseURL-test, filter: *FilterO, icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/Network.png"}
  - {name: 全球直连,    <<: *BaseDIRECT,  proxies: [DIRECT], icon: "https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/DIRECT.png"}

# =========================================
#                 规则配置
# =========================================
rules:
  # ── 私有地址 & 自定义名单（最高优先级）──
  - RULE-SET,private,全球直连
  - RULE-SET,private_IP,全球直连,no-resolve
  - RULE-SET,dawenhaozx_proxy,手动选择
  - RULE-SET,dawenhaozx_direct,全球直连

  # ── 国内 / CDN 直连 ──
  - RULE-SET,category-games@cn,全球直连
  - RULE-SET,Steam_CDN_Domain,全球直连
  - RULE-SET,Steam_CDN_IP,全球直连,no-resolve
  - RULE-SET,category-game-platforms-download,全球直连

  # ── AI 服务 ──
  - RULE-SET,category-ai,AI服务

  # ── Sony ──
  - RULE-SET,sony,Sony

  # ── Steam ──
  - RULE-SET,steam,Steam

  # ── 谷歌（域名 + IP 双覆盖）──
  - RULE-SET,google,谷歌服务
  - RULE-SET,google-ip,谷歌服务,no-resolve

  # ── 微软 ──
  - RULE-SET,microsoft,微软服务

  # ── 苹果 ──
  - RULE-SET,apple,苹果服务

  # ── Emby ──
  - RULE-SET,category-emby,Emby
  - RULE-SET,dawenhaozx_emby,Emby

  # ── 国外媒体 ──
  - RULE-SET,category-entertainment,国外媒体

  # ── 国内直连──
  - RULE-SET,cn,全球直连
  - RULE-SET,cn-ip,全球直连,no-resolve

  # ── 最终兜底 ──
  - MATCH,漏网之鱼

# =========================================
#            规则提供者
# =========================================
rule-providers:
  # 自定义
  dawenhaozx_direct:                {<<: *class,  url: "https://raw.githubusercontent.com/dawenhaozx/OpenClash_Overwrite/refs/heads/rules/direct.list"}
  dawenhaozx_proxy:                 {<<: *class,  url: "https://raw.githubusercontent.com/dawenhaozx/OpenClash_Overwrite/refs/heads/rules/proxy.list"}
  # 私有
  private:                          {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  private_IP:                       {<<: *ip,     url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"}
  # 国内 CDN / 游戏直连
  category-games@cn:                {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-games@cn.mrs"}
  Steam_CDN_Domain:                 {<<: *domain, url: "https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/refs/heads/main/rule/Steam_CDN_Domain.mrs"}
  Steam_CDN_IP:                     {<<: *ip,     url: "https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/refs/heads/main/rule/Steam_CDN_IP.mrs"}
  category-game-platforms-download: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-game-platforms-download.mrs"}
  # AI
  category-ai:                      {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs"}
  # Sony
  sony:                             {<<: *domain,  url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/sony.mrs"}
  # Steam / 谷歌 / 微软 / 苹果
  steam:                            {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/steam.mrs"}
  google:                           {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"}
  google-ip:                        {<<: *ip,     url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/google.mrs"}
  microsoft:                        {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.mrs"}
  apple:                            {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.mrs"}
  # Emby
  category-emby:                    {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-emby.mrs"}
  dawenhaozx_emby:                  {<<: *class,  url: "https://raw.githubusercontent.com/dawenhaozx/OpenClash_Overwrite/refs/heads/rules/emby.list"}
  # 国外媒体
  category-entertainment:           {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-entertainment.mrs"}
  # 国内直连
  cn:                               {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"}
  cn-ip:                            {<<: *ip,     url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"}
  # fakeip
  connectivity-check:               {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/connectivity-check.mrs"}
  fake_ip_filter:                   {<<: *class, url: "https://github.com/DustinWin/ShellCrash/blob/dev/public/fake_ip_filter.list"}

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:7874
  respect-rules: false
  fake-ip-filter-mode: rule
  nameserver:
  - dhcp://"pppoe-wan"
  - 172.16.0.1
  - 192.168.50.1
  - "[fe80::d2ef:c1ff:feea:dff7]:53"
  - 120.196.165.24
  - 211.136.192.6
  - "[2409:8057:2000:6::8]:53"
  - "[2409:8057:2000:2::8]:53"
  fake-ip-filter:
  - RULE-SET,google,fake-ip
  - RULE-SET,category-ai,fake-ip
  - RULE-SET,category-entertainment,fake-ip
  - RULE-SET,private,real-ip
  - RULE-SET,fake_ip_filter,real-ip
  - RULE-SET,apple,real-ip
  - RULE-SET,microsoft,real-ip
  - RULE-SET,dawenhaozx_direct,real-ip
  - RULE-SET,connectivity-check,real-ip
  - RULE-SET,category-games@cn,real-ip
  - RULE-SET,Steam_CDN_Domain,real-ip
  - RULE-SET,category-game-platforms-download,real-ip
  - RULE-SET,cn,real-ip
  - MATCH,fake-ip
